version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - echo "NEXT_PUBLIC_API_URL=https://5l8mvhbbbd.execute-api.ap-south-1.amazonaws.com" >> .env.production
            - env | grep -e NEXT_PUBLIC_ >> .env.production || true
            - npm run build
      artifacts:
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
