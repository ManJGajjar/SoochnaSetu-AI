version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - echo "NEXT_PUBLIC_API_URL=https://lpbk52uyspqot6qucbffi2vzri0imjqt.lambda-url.ap-south-1.on.aws" >> .env.production
            - env | grep -e NEXT_PUBLIC_ >> .env.production || true
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
